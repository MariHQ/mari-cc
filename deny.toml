# cargo-deny configuration (SPEC §7 security / supply chain).
# Run with: cargo deny check

[advisories]
version = 2
# Fail on any security advisory in the dependency tree.
yanked = "deny"

[licenses]
version = 2
# Allowlist — every dependency must resolve to one of these. Mari itself is
# MIT; these are the licenses its dependency tree and bundled models use.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "CC0-1.0",
    "MPL-2.0",
    "OpenSSL",
]
# Copyleft/NC licenses are denied by omission. The jina embedding model
# (CC-BY-NC-4.0) was removed for exactly this reason; the shipped models
# (Qwen3-Embedding-0.6B, Qwen3.5-0.8B: Apache-2.0; Unlimited-OCR: MIT) are OK.
confidence-threshold = 0.9

[bans]
# Warn on multiple versions of the same crate (build bloat); do not fail.
multiple-versions = "warn"
wildcards = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "warn"
